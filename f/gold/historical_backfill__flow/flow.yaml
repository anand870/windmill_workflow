summary: 'Historical gold price backfill: USD/AED/INR history and indicators'
description: 'Runs three sequential steps: fetch and upsert USD historical
  prices (step 1 returns the data for step 2), derive and upsert AED/INR history
  via conversion (step 2), then compute and upsert technical indicators for the
  last 200 days (step 3).'
value:
  modules:
    - id: step1_usd_history
      summary: 'Step 1: Fetch and upsert USD historical prices'
      value:
        type: rawscript
        content: '!inline step1_usd_history.py'
        input_transforms:
          database_url:
            type: javascript
            expr: flow_input.database_url
          days:
            type: javascript
            expr: flow_input.days
          freegoldapi_key:
            type: javascript
            expr: flow_input.freegoldapi_key
          goldapi_key:
            type: javascript
            expr: flow_input.goldapi_key
          metalsdev_key:
            type: javascript
            expr: flow_input.metalsdev_key
        lock: '!inline step1_usd_history.lock'
        language: python3
    - id: step2_aed_inr_history
      summary: 'Step 2: Derive and upsert AED/INR historical prices'
      value:
        type: rawscript
        content: '!inline step2_aed_inr_history.py'
        input_transforms:
          currencies:
            type: javascript
            expr: flow_input.currencies
          database_url:
            type: javascript
            expr: flow_input.database_url
          days:
            type: javascript
            expr: flow_input.days
          metalsdev_key:
            type: javascript
            expr: flow_input.metalsdev_key
          usd_history:
            type: javascript
            expr: results.step1_usd_history.usd_history
        lock: '!inline step2_aed_inr_history.lock'
        language: python3
    - id: step3_indicators
      summary: 'Step 3: Compute and upsert technical indicators'
      value:
        type: rawscript
        content: '!inline step3_indicators.py'
        input_transforms:
          database_url:
            type: javascript
            expr: flow_input.database_url
        lock: '!inline step3_indicators.lock'
        language: python3
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - database_url
    - days
    - currencies
    - freegoldapi_key
    - metalsdev_key
    - goldapi_key
  properties:
    currencies:
      type: array
      description: Currencies to backfill
      default:
        - USD
        - AED
        - INR
      items:
        type: string
    database_url:
      type: string
      description: PostgreSQL connection URL
      default: $var:u/rohit/gold_db_writer_url
    days:
      type: integer
      description: Number of days of history to backfill
      default: 365
    freegoldapi_key:
      type: string
      description: FreeGoldAPI key (optional)
      default: $var:u/rohit/freegoldapi_key
    goldapi_key:
      type: string
      description: GoldAPI key (optional)
      default: $var:u/rohit/goldapi_key
    metalsdev_key:
      type: string
      description: Metals.dev API key (optional, used for INR history)
      default: $var:u/rohit/metalsdev_key
  required:
    - database_url
