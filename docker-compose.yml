services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: windmill_db
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-windmill}
      POSTGRES_USER: ${DATABASE_USER:-windmill}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-windmill_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-windmill}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - windmill

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: windmill_redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-windmill_dev_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-windmill_dev_password}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - windmill

  # Windmill Server
  windmill:
    image: ghcr.io/windmill-labs/windmill:latest
    container_name: windmill_server
    pull_policy: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://windmill:windmill_dev_password@postgres:5432/windmill}
      REDIS_URL: ${REDIS_URL:-redis://:windmill_dev_password@redis:6379}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      WORKERS_PER_CORE: ${WORKERS_PER_CORE:-1}
      TIMEOUT: ${TIMEOUT:-300}
      SCRIPT_TIMEOUT: ${SCRIPT_TIMEOUT:-300}
      PIP_INDEX_URL: ${PIP_INDEX_URL}
      PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL}
      # Development settings
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${WINDMILL_PORT:-8000}:8000"
    volumes:
      - ./data/windmill:/var/lib/windmill
    networks:
      - windmill
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Windmill Worker
  windmill_worker:
    image: ghcr.io/windmill-labs/windmill:latest
    container_name: windmill_worker
    pull_policy: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://windmill:windmill_dev_password@postgres:5432/windmill}
      REDIS_URL: ${REDIS_URL:-redis://:windmill_dev_password@redis:6379}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      WORKERS_PER_CORE: ${WORKERS_PER_CORE:-1}
      TIMEOUT: ${TIMEOUT:-300}
      SCRIPT_TIMEOUT: ${SCRIPT_TIMEOUT:-300}
      PIP_INDEX_URL: ${PIP_INDEX_URL}
      PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NUM_WORKERS: ${NUM_WORKERS:-2}
      WORKER_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/windmill:/var/lib/windmill
    networks:
      - windmill

networks:
  windmill:
    driver: bridge
